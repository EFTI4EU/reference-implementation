version: 2
updates:
  - package-ecosystem: "maven"
    target-branch: "EREF-81-update-gate-libs"
    directories:
      - "/implementation/**/*"
    schedule:
      interval: "cron"
      cronjob: "30 13 * * *"
    open-pull-requests-limit: 50
    groups:
      maven-dependencies:
        patterns:
          - "*"
